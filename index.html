<!-- Página principal -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <!-- Poner luego css-->
</head>
 
<body>
 
    <!-- HEADER: título + subtítulo -->
    <header>
        <h1>MiniBlog</h1>
        <h2>Explora y comparte</h2>
    </header>
 
    <!-- CONTENEDOR PRINCIPAL -->
    <div class="page-wrapper">
        <!-- BÚSQUEDA -->
        <section id="search">
            <div id="searchBar">
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Escribe lo que quieres buscar..."
                >
                <button id="searchButton">Buscar</button>
            </div>

            <!-- Filtros -->

            <!-- Filtro si quiere buscar por texto o por usuario -->
            <select id="searchType">
                <option value="query">Titulo o contenido</option>
                <option value="user">ID de usuario</option>
                <option value="tag">Tag</option>
            </select>

            <!-- Si es tag no tiene que escribir si no seleccionar-->
            <select id="tagSelect" hidden></select>

            <!-- Botón para limpiar filtros y volver a la vista normal -->
            <button id="clearSearchBtn" hidden>✕ Limpiar búsqueda</button>
        </section>
 
        <!-- UI STATE: estado de la búsqueda -->
        <div class="ui-state-bar" id="searchStatus">Estado: esperando búsqueda…</div>

        <!-- Area para la paginación -->
        <div id="pagination">
            <select id="limitSelect">
                <option value="5">5 por página</option>
                <option value="10" selected>10 por página</option>
                <option value="20">20 por página</option>
            </select>

            <button id="prevBtn" disabled>← Anterior</button>
            <span id="pageInfo">Página 1 de ?</span>
            <button id="nextBtn" disabled>Siguiente →</button>
        </div>

        <!-- Acciones principales -->
        <div class="actions">
            <a href="pages/vistaPost.html">
                <button>Crear nuevo post</button>
            </a>

            <a href="pages/favoritos.html">
                <button>Ver favoritos</button>
            </a>
        </div>
 
        <!-- LISTA DE PUBLICACIONES -->
        <section id="postsSection">
            <h2>Publicaciones</h2>
            <ul id="postsContainer"></ul>
        </section>
    </div>
 
    <footer>
        <small>Blog &copy; 2026 — UVG Sistemas y Tecnologías Web</small>
    </footer>
 
    <script type="module" src="js/main.js"></script>
</body>
</html>
