<!-- Vista de creación de post -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Post | MiniBlog</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <header>
    <h1>MiniBlog</h1>
    <h2>Crear nueva publicación</h2>
  </header>

  <main class="page-wrapper">
    <nav>
      <a href="../index.html">← Volver al inicio</a>
    </nav>

    <section id="formSection">
      <div id="formMessage"></div>

      <form id="postForm">
        <div>
          <label for="title">Título</label>
          <input type="text" id="title" name="title">
        </div>

        <div>
          <label for="body">Contenido</label>
          <textarea id="body" name="body" rows="6"></textarea>
        </div>

        <div>
          <label for="userId">ID de usuario</label>
          <input type="number" id="userId" name="userId">
        </div>

        <button type="submit">Crear publicación</button>
      </form>
    </section>
  </main>

  <footer>
    <small>Blog &copy; 2026 — UVG Sistemas y Tecnologías Web</small>
  </footer>

  <script type="module" src="../js/form/form.js"></script>
</body>
</html>
